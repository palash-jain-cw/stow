# Ephemeral Postgres for local pytest (no docker-group membership required).
#
# Start once (needs sudo if your user is not in the docker group):
#   sudo docker compose -f docker-compose.test.yml up -d
#
# Then run tests from backend/:
#   uv run pytest tests/
#
# conftest.py picks up STOW_TEST_DATABASE_URL automatically when testcontainers
# cannot reach the Docker socket.

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test"]
      interval: 2s
      timeout: 5s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data
