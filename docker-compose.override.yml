services:
  backend:
    build:
      target: dev
    volumes:
      - ./backend/src:/app/src
    command: uvicorn stow.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    ports:
      - "5173:5173"
