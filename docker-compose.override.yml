services:
  backend:
    volumes:
      - ./backend/src:/app/src
    command: uv run uvicorn stow.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
