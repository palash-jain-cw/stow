services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      STOW_LLM_BASE_URL: ${STOW_LLM_BASE_URL}
      STOW_LLM_MODEL: ${STOW_LLM_MODEL}
      STOW_LLM_API_KEY: ${STOW_LLM_API_KEY:-}
      STOW_LLM_PROXY_PORT: ${STOW_LLM_PROXY_PORT:-8081}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      llm-proxy:
        condition: service_started
    volumes:
      - attachments:/stow/attachments
      - stow_config:/root/.stow

  # Host STOW_LLM_PROXY_PORT (default 8081) → llama-server on 127.0.0.1:8080.
  llm-proxy:
    image: alpine/socat
    network_mode: host
    entrypoint: ["/bin/sh", "-c"]
    environment:
      LLM_PROXY_PORT: ${STOW_LLM_PROXY_PORT:-8081}
    command:
      - exec socat TCP-LISTEN:$${LLM_PROXY_PORT},fork,reuseaddr TCP:127.0.0.1:8080
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@stow.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - dev

volumes:
  postgres_data:
  attachments:
  stow_config:
